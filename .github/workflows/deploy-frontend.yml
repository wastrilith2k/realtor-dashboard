# Deploys the frontend to S3 and invalidates the CloudFront cache
#
# Triggers on push to main when frontend files change.
#
# Required GitHub Secrets (set in repo Settings → Secrets):
#   AWS_ACCESS_KEY_ID      — IAM user with S3 + CloudFront permissions
#   AWS_SECRET_ACCESS_KEY  — matching secret key
#   S3_BUCKET_NAME         — from the SAM stack output (BucketName)
#   CLOUDFRONT_DIST_ID     — from the SAM stack output (DistributionId)
#   VITE_API_BASE_URL      — your API Gateway URL (e.g. https://xyz.execute-api.us-east-1.amazonaws.com/Prod)

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Sync built files to S3. --delete removes old files not in the new build.
      - name: Deploy to S3
        run: aws s3 sync frontend/dist s3://${{ secrets.S3_BUCKET_NAME }} --delete

      # Tell CloudFront to drop its cache so users see the new version immediately.
      # Without this, cached pages could be stale for up to 24 hours.
      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} --paths "/*"
